{% extends "base.html" %}
{% block title %}Operator Login – H2GV UX Questionnaire{% endblock %}

{% block content %}
<div class="card" style="max-width:440px; margin:0 auto;">
  <div class="section-title">
    <span class="step-dot">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
    </span>
    Operator Login
  </div>
  <div style="margin:-4px 0 4px;"><span class="operator-tag">Research Team Only</span></div>
  <div class="section-desc">Enter the operator password to access the panel.</div>

  <form method="POST" action="{{ url_for('operator_login') }}">
    <div class="form-group">
      <label class="field-label" for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="off" autofocus required />
    </div>

    <div class="btn-row">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
        Back
      </a>
      <button type="submit" class="btn btn-primary">
        Enter
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
      </button>
    </div>
  </form>
</div>
{% endblock %}
